<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>펄스홈 포커스 플래너</title>
  <style>
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --line: #e5e7eb;
      --accent: #2563eb;
      --accent-soft: #dbeafe;
      --radius: 12px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "맑은 고딕", sans-serif;
      background: linear-gradient(180deg, #f8fafc 0%, #f3f7ff 100%);
      color: var(--text);
    }

    .app {
      max-width: 760px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 16px;
      padding-bottom: calc(150px + env(safe-area-inset-bottom));
    }

    .header {
      position: sticky;
      top: 0;
      z-index: 5;
      background: rgba(248, 250, 252, 0.94);
      backdrop-filter: blur(8px);
      padding: 8px 0 12px;
      border-bottom: 1px solid #eef2ff;
    }

    h1 {
      margin: 0;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    .subtitle {
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
    }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    .stack {
      display: grid;
      gap: 14px;
      margin-top: 14px;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 16px;
      background: #ffffff;
    }

    .card-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 12px;
    }

    .row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .meta { color: var(--muted); font-size: 13px; }

    .progress {
      margin-top: 10px;
      height: 8px;
      border-radius: 999px;
      background: #eff6ff;
      overflow: hidden;
    }

    .progress > span {
      display: block;
      height: 100%;
      background: var(--accent);
      width: 0;
    }

    input, select, button, textarea {
      font: inherit;
      font-size: 16px;
      min-height: 44px;
      border-radius: 10px;
    }

    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      padding: 0 12px;
      background: #fff;
    }

    textarea {
      min-height: 80px;
      padding: 10px 12px;
      resize: vertical;
    }

    button {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      padding: 0 14px;
      cursor: pointer;
    }

    .btn-primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      font-weight: 600;
    }

    .inline {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
    }

    .list { display: grid; gap: 8px; }

    .item {
      border: 1px solid var(--line);
      border-radius: 10px;
      min-height: 44px;
      padding: 10px 12px;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .item.done .label {
      color: var(--muted);
      text-decoration: line-through;
    }

    .item-left { display: flex; align-items: center; gap: 10px; min-width: 0; }

    .check {
      width: 20px;
      height: 20px;
      border-radius: 6px;
      border: 1px solid var(--line);
      background: #fff;
      display: inline-block;
      flex-shrink: 0;
      cursor: pointer;
    }

    .check.checked {
      border-color: var(--accent);
      background: var(--accent);
    }

    .label {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: 14px;
      max-width: 270px;
    }

    .tiny { font-size: 12px; color: var(--muted); }

    .goal-form, .routine-form { display: grid; gap: 8px; }
    .goal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

    .divider {
      margin: 10px 0;
      height: 1px;
      background: var(--line);
    }

    .stats-grid { display: grid; gap: 10px; }

    .coach {
      white-space: pre-wrap;
      font-size: 13px;
      color: #1e293b;
      line-height: 1.5;
    }

    .date-toolbar {
      display: grid;
      gap: 10px;
    }

    .date-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .date-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .calendar-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      gap: 8px;
    }

    .calendar-grid,
    .calendar-weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
    }

    .calendar-weekdays div {
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      padding: 4px 0;
    }

    .day-btn {
      min-height: 56px;
      padding: 6px 4px;
      border-radius: 10px;
      display: grid;
      justify-items: center;
      align-content: center;
      gap: 2px;
      font-size: 13px;
    }

    .day-btn.muted {
      color: #94a3b8;
      background: #f8fafc;
    }

    .day-btn.selected {
      border-color: var(--accent);
      background: var(--accent-soft);
      color: #1d4ed8;
      font-weight: 700;
    }

    .day-dot {
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: #60a5fa;
    }

    .day-count {
      font-size: 10px;
      color: #2563eb;
    }

    .bottom-nav {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 10;
      background: #ffffff;
      border-top: 1px solid var(--line);
      padding: 8px 10px calc(8px + env(safe-area-inset-bottom));
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
    }

    .tab-btn {
      min-height: 44px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--muted);
      font-size: 12px;
      padding: 6px;
      border-radius: 10px;
    }

    .tab-btn.active {
      color: var(--accent);
      border-color: #bfdbfe;
      background: var(--accent-soft);
      font-weight: 600;
    }

    .ai-float {
      position: fixed;
      right: 16px;
      bottom: calc(86px + env(safe-area-inset-bottom));
      width: 56px;
      height: 56px;
      border-radius: 999px;
      border: 1px solid var(--accent);
      background: var(--accent);
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      z-index: 30;
    }

    .ai-modal {
      position: fixed;
      inset: 0;
      z-index: 40;
      background: rgba(15, 23, 42, 0.4);
      display: none;
      align-items: flex-end;
      justify-content: center;
    }

    .ai-modal.open { display: flex; }

    .ai-dialog {
      width: min(680px, 100%);
      height: min(78vh, 760px);
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 14px 14px 0 0;
      display: grid;
      grid-template-rows: auto 1fr auto;
      overflow: hidden;
    }

    .ai-top {
      border-bottom: 1px solid var(--line);
      padding: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .chat-list {
      padding: 12px;
      overflow: auto;
      display: grid;
      gap: 8px;
      align-content: start;
      background: #f8fafc;
    }

    .chat-item {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      padding: 10px;
      white-space: pre-wrap;
      line-height: 1.45;
      font-size: 14px;
    }

    .chat-item.user { border-color: #bfdbfe; background: #eff6ff; }

    .chat-input-wrap {
      border-top: 1px solid var(--line);
      padding: 10px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      background: #fff;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      border: 0;
    }



    @media (max-width: 720px) {
      .app { padding: 14px; }
      .ai-dialog {
        width: 100%;
        height: calc(100vh - 10px);
        border-radius: 12px 12px 0 0;
      }
      .label { max-width: 200px; }
      .mandalart-board { min-width: 300px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="header">
      <h1>펄스홈 포커스 플래너</h1>
      <div class="subtitle">오늘의 흐름을 차분하게 쌓아가는 생산성 기록장</div>
    </header>

    <section class="tab-panel active" id="panel-focus">
      <div class="stack">
        <div class="card">
          <div class="card-title">핵심 목표</div>
          <div class="row">
            <strong id="focusYearlyTitle">연간 목표가 없습니다</strong>
            <span class="meta" id="focusYearlyValue">0%</span>
          </div>
          <div class="tiny" id="focusMonthlyTitle" style="margin-top:8px;">대표 월간 목표가 없습니다</div>
          <div class="progress"><span id="focusYearlyBar"></span></div>
        </div>

        <div class="card">
          <div class="card-title">오늘 실행 현황</div>
          <div class="row">
            <span class="meta">오늘 남은 할일</span>
            <strong id="focusTodayRemain">0</strong>
          </div>
          <div class="row" style="margin-top:6px;">
            <span class="meta">루틴 완료율</span>
            <strong id="focusRoutineValue">0%</strong>
          </div>
          <div class="progress"><span id="focusRoutineBar"></span></div>
        </div>

        <div class="card">
          <div class="card-title">오늘의 제안</div>
          <div class="meta" id="focusInsight">오늘의 제안을 불러오는 중입니다</div>
        </div>
      </div>
    </section>

    <section class="tab-panel" id="panel-tasks">
      <div class="stack">
        <div class="card date-toolbar">
          <div class="date-header">
            <div>
              <div class="card-title" style="margin-bottom:4px;">선택한 날짜</div>
              <strong id="selectedDateLabel">-</strong>
            </div>
            <div class="date-actions">
              <button id="prevDateBtn">이전날</button>
              <button id="todayDateBtn">오늘</button>
              <button id="nextDateBtn">다음날</button>
            </div>
          </div>

          <div>
            <div class="calendar-head">
              <button id="prevMonthBtn">이전달</button>
              <strong id="calendarMonthLabel">-</strong>
              <button id="nextMonthBtn">다음달</button>
            </div>
            <div class="calendar-weekdays" aria-hidden="true">
              <div>일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div>토</div>
            </div>
            <div class="calendar-grid" id="calendarGrid"></div>
          </div>
        </div>

        <div class="card">
          <div class="card-title">할일 추가</div>
          <div class="goal-form">
            <input id="taskTitle" type="text" placeholder="할일 제목" maxlength="120" />
            <div class="goal-grid">
              <select id="taskYearlyGoal"><option value="">연간 목표 선택</option></select>
              <select id="taskMonthlyGoal"><option value="">월간 목표 선택</option></select>
            </div>
            <input id="taskDue" type="date" />
            <button class="btn-primary" id="addTaskBtn">할일 추가</button>
          </div>
        </div>

        <div class="card">
          <div class="card-title">해당 날짜 할일</div>
          <div class="list" id="selectedTaskList"></div>
        </div>
      </div>
    </section>

    <section class="tab-panel" id="panel-goals">
      <div class="stack">
        <div class="card">
          <div class="card-title">목표 만들기</div>
          <div class="goal-form">
            <input id="goalTitle" type="text" placeholder="목표 제목" maxlength="120" />
            <div class="goal-grid">
              <select id="goalType">
                <option value="yearly">연간</option>
                <option value="monthly">월간</option>
              </select>
              <input id="goalTarget" type="number" min="1" value="10" />
            </div>
            <select id="goalParent" style="display:none;"><option value="">연간 목표 선택(월간일 때 필수)</option></select>
            <input id="goalDeadline" type="date" />
            <button class="btn-primary" id="addGoalBtn">목표 추가</button>
          </div>
        </div>

        <div class="card">
          <div class="card-title">연간 목표</div>
          <div class="list" id="goalHierarchyList"></div>
        </div>

        <div class="card">
          <div class="section-head">
            <div class="card-title" style="margin-bottom:0;">만다라트</div>
            <button class="btn-primary" id="addMandalartBtn">만다라트 추가</button>
          </div>
          <div class="mandalart-form" style="margin-bottom:10px;">
            <input id="mandalartTitle" type="text" placeholder="상위 목표 제목" maxlength="120" />
            <input id="mandalartDue" type="date" />
            <textarea class="cell-input" id="mandalartCenter" placeholder="핵심 목표(가운데 칸)"></textarea>
          </div>
          <div class="list" id="mandalartList"></div>
        </div>
      </div>
    </section>

    <section class="tab-panel" id="panel-routine">
      <div class="stack">
        <div class="card">
          <div class="card-title">루틴 추가</div>
          <div class="routine-form">
            <input id="routineTitle" type="text" placeholder="루틴 제목" maxlength="80" />
            <button class="btn-primary" id="addRoutineBtn">루틴 추가</button>
          </div>
        </div>

        <div class="card">
          <div class="card-title">오늘 루틴 점검</div>
          <div class="list" id="routineList"></div>
        </div>
      </div>
    </section>

    <section class="tab-panel" id="panel-stats">
      <div class="stack">
        <div class="card">
          <div class="card-title">집중 점수</div>
          <div class="row">
            <span class="meta">현재 점수</span>
            <strong><span id="focusScore">0</span> / 100</strong>
          </div>
        </div>

        <div class="card">
          <div class="card-title">생산성 통계</div>
          <div class="stats-grid">
            <div class="row"><span class="meta">완료한 할일</span><strong id="statCompleted">0</strong></div>
            <div class="row"><span class="meta">전체 할일</span><strong id="statTotal">0</strong></div>
            <div class="row"><span class="meta">루틴 완료율</span><strong id="statRoutineRate">0%</strong></div>
            <div class="row"><span class="meta">목표 달성</span><strong id="statWeeklyGoals">0 / 0</strong></div>
          </div>
        </div>

        <div class="card">
          <div class="card-title">주간 회고</div>
          <div class="coach" id="weeklyCoachText">아직 주간 회고가 없습니다</div>
        </div>
      </div>
    </section>
  </main>

  <button class="ai-float" id="openAiBtn" aria-label="인공지능 비서 열기">비서</button>

  <section class="ai-modal" id="aiModal" aria-modal="true" role="dialog" aria-labelledby="aiTitle">
    <div class="ai-dialog">
      <div class="ai-top">
        <strong id="aiTitle">인공지능 비서</strong>
        <button id="closeAiBtn">닫기</button>
      </div>
      <div class="chat-list" id="chatList"></div>
      <div class="chat-input-wrap">
        <label for="chatInput" class="sr-only">질문 입력</label>
        <textarea id="chatInput" placeholder="무엇이든 물어보세요"></textarea>
        <button class="btn-primary" id="sendChatBtn">전송</button>
      </div>
    </div>
  </section>

  <nav class="bottom-nav">
    <button class="tab-btn active" data-tab="focus">집중</button>
    <button class="tab-btn" data-tab="tasks">할일</button>
    <button class="tab-btn" data-tab="goals">목표</button>
    <button class="tab-btn" data-tab="routine">루틴</button>
    <button class="tab-btn" data-tab="stats">통계</button>
  </nav>

  <script>
    const STORAGE_KEY = 'pulsehome_personal_os_v3';
    const tabs = ['focus', 'tasks', 'goals', 'routine', 'stats'];

    function today() {
      return formatDate(new Date());
    }

    function formatDate(dateObj) {
      const y = dateObj.getFullYear();
      const m = String(dateObj.getMonth() + 1).padStart(2, '0');
      const d = String(dateObj.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    }

    function parseDate(dateText) {
      const [y, m, d] = String(dateText).split('-').map(Number);
      if (!y || !m || !d) return null;
      const dt = new Date(y, m - 1, d);
      if (formatDate(dt) !== dateText) return null;
      return dt;
    }

    function shiftDate(dateText, diff) {
      const base = parseDate(dateText) || parseDate(today());
      base.setDate(base.getDate() + diff);
      return formatDate(base);
    }

    function uid() {
      return Math.random().toString(36).slice(2, 10) + Date.now().toString(36);
    }

    function weekKey(d) {
      const t = new Date(d);
      t.setHours(0, 0, 0, 0);
      const sunday = new Date(t);
      sunday.setDate(t.getDate() - t.getDay());
      return formatDate(sunday);
    }

    function normalizeDateText(value) {
      if (!value) return null;
      const text = String(value).slice(0, 10);
      return parseDate(text) ? text : null;
    }

    function defaultState() {
      const t = today();
      return {
        tasks: [],
        routines: [],
        goals: [],
        mandalarts: [],
        ai: {
          dailyInsight: '',
          dailyInsightDate: '',
          weeklyReview: '',
          weeklyReviewWeekKey: '',
          chatHistory: []
        },
        ui: {
          tab: 'focus',
          selectedDate: t,
          calendarMonth: t.slice(0, 7)
        }
      };
    }

    function normalizeGoal(g) {
      const normalizedType = g.type === 'yearly' ? 'yearly' : (g.type === 'monthly' || g.type === 'weekly' ? 'monthly' : 'monthly');
      return {
        id: g.id,
        title: String(g.title || '').trim(),
        type: normalizedType,
        parentGoalId: normalizedType === 'yearly' ? null : String(g.parentGoalId || g.yearlyGoalId || ''),
        target: Math.max(1, Number(g.target) || 1),
        progress: Math.max(0, Number(g.progress) || 0),
        deadline: normalizeDateText(g.deadline),
        linkedTodos: Array.isArray(g.linkedTodos) ? g.linkedTodos.filter(Boolean) : [],
        createdAt: Number(g.createdAt) || Date.now()
      };
    }

    function normalizeMandalartCell(cell, fallbackText = '') {
      return {
        id: String(cell?.id || uid()),
        text: String(cell?.text ?? cell?.title ?? cell?.value ?? fallbackText ?? '').trim(),
        linkedGoalId: String(cell?.linkedGoalId || cell?.goalId || ''),
        linkedTodoIds: Array.isArray(cell?.linkedTodoIds)
          ? cell.linkedTodoIds.map(String).filter(Boolean)
          : Array.isArray(cell?.todoIds)
            ? cell.todoIds.map(String).filter(Boolean)
            : []
      };
    }

    function normalizeMandalart(item, idx = 0) {
      const sourceCells = Array.isArray(item?.cells)
        ? item.cells
        : Array.isArray(item?.subGoals)
          ? item.subGoals
          : Array.isArray(item?.items)
            ? item.items
            : Array.isArray(item?.details)
              ? item.details
              : [];
      const centerText = String(item?.centerText || item?.coreGoal || item?.title || '').trim();
      const cells = [];
      for (let i = 0; i < 9; i += 1) {
        const cell = sourceCells[i] || {};
        const fallback = i === 4 ? centerText : '';
        cells.push(normalizeMandalartCell(cell, fallback));
      }
      if (!cells[4].text) cells[4].text = centerText;
      return {
        id: String(item?.id || uid()),
        title: String(item?.title || item?.name || cells[4].text || `만다라트 ${idx + 1}`).trim(),
        dueDate: normalizeDateText(item?.dueDate || item?.deadline || item?.targetDate),
        cells,
        collapsed: !!item?.collapsed,
        createdAt: Number(item?.createdAt) || Date.now()
      };
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY) || localStorage.getItem('pulsehome_personal_os_v2') || localStorage.getItem('focus_planner_v3');
        if (!raw) return defaultState();
        const p = JSON.parse(raw);
        const d = defaultState();
        return {
          tasks: Array.isArray(p.tasks) ? p.tasks.map(t => ({
            id: t.id,
            title: String(t.title || '').trim(),
            status: t.status === 'done' ? 'done' : 'active',
            dueDate: normalizeDateText(t.dueDate) || today(),
            createdAt: Number(t.createdAt) || Date.now(),
            doneAt: t.doneAt || null,
            linkedGoalId: String(t.linkedGoalId || t.monthlyGoalId || '')
          })).filter(t => t.id && t.title) : [],
          routines: Array.isArray(p.routines) ? p.routines.map(r => ({
            id: r.id,
            title: String(r.title || '').trim(),
            doneDates: r.doneDates && typeof r.doneDates === 'object' ? r.doneDates : {},
            createdAt: Number(r.createdAt) || Date.now()
          })).filter(r => r.id && r.title) : [],
          goals: Array.isArray(p.goals) ? p.goals.map(normalizeGoal).filter(g => g.id && g.title) : [],
          mandalarts: (() => {
            const legacy = p.mandalarts || p.mandalart || p.mandalat || p.goalMandalarts;
            const fromArray = Array.isArray(legacy)
              ? legacy
              : [];
            const fromObject = p.mandala && typeof p.mandala === 'object' && !Array.isArray(p.mandala)
              ? (() => {
                const legacyCells = Array.isArray(p.mandala.cells) ? p.mandala.cells : [];
                const centerText = String(p.mandala.centerText || p.mandala.coreGoal || p.mandala.core || '').trim();
                const cells = Array.from({ length: 9 }).map((_, index) => ({ text: String(legacyCells[index] || '').trim() }));
                if (centerText) cells[4].text = centerText;
                return [{
                  id: p.mandala.id,
                  title: p.mandala.title || centerText || '복구된 만다라트',
                  dueDate: p.mandala.dueDate || p.mandala.deadline,
                  cells,
                  createdAt: p.mandala.createdAt
                }];
              })()
              : Array.isArray(p.mandala)
                ? p.mandala
                : [];
            return [...fromArray, ...fromObject]
              .map((item, idx) => normalizeMandalart(item, idx))
              .filter(m => m.id && m.title);
          })(),
          ai: {
            dailyInsight: String(p.ai?.dailyInsight || ''),
            dailyInsightDate: String(p.ai?.dailyInsightDate || ''),
            weeklyReview: String(p.ai?.weeklyReview || ''),
            weeklyReviewWeekKey: String(p.ai?.weeklyReviewWeekKey || ''),
            chatHistory: Array.isArray(p.ai?.chatHistory)
              ? p.ai.chatHistory
                .map(m => ({ role: m.role === 'assistant' ? 'assistant' : 'user', text: String(m.text || '').trim() }))
                .filter(m => m.text)
                .slice(-40)
              : []
          },
          ui: {
            tab: tabs.includes(p.ui?.tab) ? p.ui.tab : d.ui.tab,
            selectedDate: normalizeDateText(p.ui?.selectedDate) || d.ui.selectedDate,
            calendarMonth: /^\d{4}-\d{2}$/.test(String(p.ui?.calendarMonth || ''))
              ? String(p.ui.calendarMonth)
              : (normalizeDateText(p.ui?.selectedDate) || d.ui.selectedDate).slice(0, 7)
          }
        };
      } catch {
        return defaultState();
      }
    }

    function saveState() {
      state.tasks = state.tasks.map(task => ({
        ...task,
        dueDate: normalizeDateText(task.dueDate) || today()
      }));
      state.mandalarts = (Array.isArray(state.mandalarts) ? state.mandalarts : []).map((item, idx) => normalizeMandalart(item, idx));
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    const state = loadState();

    function ensureGoalHierarchy() {
      const yearlyGoals = state.goals.filter(g => g.type === 'yearly');
      const fallbackYearly = yearlyGoals[0]?.id || null;
      state.goals.forEach(goal => {
        if (goal.type === 'yearly') {
          goal.parentGoalId = null;
        } else {
          if (!goal.parentGoalId || !state.goals.some(g => g.id === goal.parentGoalId && g.type === 'yearly')) {
            goal.parentGoalId = fallbackYearly;
          }
        }
      });
    }

    function refreshAllGoalProgress() {
      const monthlyGoals = state.goals.filter(g => g.type === 'monthly');
      monthlyGoals.forEach(goal => {
        const linked = state.tasks.filter(task => goal.linkedTodos.includes(task.id));
        const done = linked.filter(task => task.status === 'done').length;
        goal.progress = Math.min(goal.target, done);
      });

      const yearlyGoals = state.goals.filter(g => g.type === 'yearly');
      yearlyGoals.forEach(goal => {
        const children = monthlyGoals.filter(m => m.parentGoalId === goal.id);
        if (!children.length) {
          goal.progress = 0;
          goal.target = 100;
          return;
        }
        const avg = Math.round(children.reduce((sum, child) => sum + progressPercent(child.progress, child.target), 0) / children.length);
        goal.target = 100;
        goal.progress = avg;
      });
    }

    function renderGoalSelects() {
      const yearlyGoals = state.goals.filter(g => g.type === 'yearly').sort((a, b) => b.createdAt - a.createdAt);
      const goalParent = document.getElementById('goalParent');
      const taskYearlyGoal = document.getElementById('taskYearlyGoal');
      if (goalParent) {
        goalParent.innerHTML = `<option value="">연간 목표 선택(월간일 때 필수)</option>${yearlyGoals.map(g => `<option value="${g.id}">${escapeHtml(g.title)}</option>`).join('')}`;
      }
      if (taskYearlyGoal) {
        const selected = taskYearlyGoal.value;
        taskYearlyGoal.innerHTML = `<option value="">연간 목표 선택</option>${yearlyGoals.map(g => `<option value="${g.id}">${escapeHtml(g.title)}</option>`).join('')}`;
        taskYearlyGoal.value = yearlyGoals.some(g => g.id === selected) ? selected : '';
      }
      renderTaskMonthlyGoalOptions();
    }

    function renderTaskMonthlyGoalOptions() {
      const yearlyId = document.getElementById('taskYearlyGoal')?.value || '';
      const monthlySelect = document.getElementById('taskMonthlyGoal');
      if (!monthlySelect) return;
      const monthlyGoals = state.goals
        .filter(g => g.type === 'monthly' && (!yearlyId || g.parentGoalId === yearlyId))
        .sort((a, b) => b.createdAt - a.createdAt);
      const current = monthlySelect.value;
      monthlySelect.innerHTML = `<option value="">월간 목표 선택</option>${monthlyGoals.map(g => `<option value="${g.id}">${escapeHtml(g.title)}</option>`).join('')}`;
      monthlySelect.value = monthlyGoals.some(g => g.id === current) ? current : '';
    }


    function setTab(tab) {
      state.ui.tab = tab;
      saveState();
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.tab === tab);
      });
      document.querySelectorAll('.tab-panel').forEach(panel => {
        panel.classList.toggle('active', panel.id === `panel-${tab}`);
      });
      renderCurrentTab();
    }

    function setSelectedDate(dateText) {
      const next = normalizeDateText(dateText) || today();
      state.ui.selectedDate = next;
      state.ui.calendarMonth = next.slice(0, 7);
      saveState();
      renderTasks();
      renderFocus();
    }

    function progressPercent(v, total) {
      if (!total) return 0;
      return Math.max(0, Math.min(100, Math.round((v / total) * 100)));
    }

    function getSelectedDateTasks() {
      const d = state.ui.selectedDate;
      return state.tasks
        .filter(task => task.dueDate === d)
        .sort((a, b) => {
          if (a.status !== b.status) return a.status === 'active' ? -1 : 1;
          return b.createdAt - a.createdAt;
        });
    }

    function getTodayTasks() {
      const d = today();
      return state.tasks.filter(task => task.status === 'active' && task.dueDate === d);
    }

    function getDoneTasksCount() {
      return state.tasks.filter(t => t.status === 'done').length;
    }

    function calcRoutineRateToday() {
      const total = state.routines.length;
      if (!total) return 0;
      const d = today();
      const done = state.routines.filter(r => !!r.doneDates[d]).length;
      return Math.round((done / total) * 100);
    }

    function calcStreak() {
      let streak = 0;
      const now = parseDate(today());
      for (let i = 0; i < 365; i++) {
        const day = new Date(now);
        day.setDate(now.getDate() - i);
        const key = formatDate(day);

        const hasTask = state.tasks.some(t => t.doneAt && formatDate(new Date(t.doneAt)) === key);
        const hasRoutine = state.routines.some(r => !!r.doneDates[key]);
        if (hasTask || hasRoutine) streak += 1;
        else if (i > 0) break;
      }
      return streak;
    }

    function resetWeeklyGoalsIfNeeded() {
      return;
    }

    function refreshGoalProgressForTask(taskId) {
      if (!taskId) return;
      refreshAllGoalProgress();
    }

    function addTask() {
      const title = document.getElementById('taskTitle').value.trim();
      const dueInput = document.getElementById('taskDue').value;
      const dueDate = normalizeDateText(dueInput) || state.ui.selectedDate || today();
      if (!title) return;

      const monthlyGoalId = document.getElementById('taskMonthlyGoal').value;
      const taskId = uid();
      state.tasks.unshift({
        id: taskId,
        title,
        status: 'active',
        dueDate,
        linkedGoalId: monthlyGoalId || '',
        createdAt: Date.now(),
        doneAt: null
      });
      if (monthlyGoalId) {
        const monthlyGoal = state.goals.find(g => g.id === monthlyGoalId && g.type === 'monthly');
        if (monthlyGoal && !monthlyGoal.linkedTodos.includes(taskId)) monthlyGoal.linkedTodos.push(taskId);
      }
      refreshAllGoalProgress();
      document.getElementById('taskTitle').value = '';
      document.getElementById('taskDue').value = state.ui.selectedDate;
      saveState();
      renderTasks();
      renderFocus();
      renderStats();
      renderGoals();
    }

    function toggleTask(taskId) {
      const task = state.tasks.find(t => t.id === taskId);
      if (!task) return;
      task.status = task.status === 'done' ? 'active' : 'done';
      task.doneAt = task.status === 'done' ? Date.now() : null;
      refreshGoalProgressForTask(taskId);
      saveState();
      renderTasks();
      renderGoals();
      renderFocus();
      renderStats();
    }

    function addGoal() {
      const title = document.getElementById('goalTitle').value.trim();
      const type = document.getElementById('goalType').value;
      const target = Number(document.getElementById('goalTarget').value || 0);
      const deadline = normalizeDateText(document.getElementById('goalDeadline').value);
      if (!title || target < 1) return;

      const parentGoalId = document.getElementById('goalParent').value;
      const normalizedType = type === 'yearly' ? 'yearly' : 'monthly';
      if (normalizedType === 'monthly' && !parentGoalId) return;

      state.goals.unshift({
        id: uid(),
        title,
        type: normalizedType,
        parentGoalId: normalizedType === 'yearly' ? null : parentGoalId,
        target,
        progress: 0,
        deadline,
        linkedTodos: [],
        createdAt: Date.now()
      });

      document.getElementById('goalTitle').value = '';
      document.getElementById('goalTarget').value = normalizedType === 'yearly' ? '10' : '10';
      document.getElementById('goalParent').value = '';
      ensureGoalHierarchy();
      refreshAllGoalProgress();
      saveState();
      renderGoals();
      renderFocus();
      renderStats();
    }


    function addMandalart() {
      const titleInput = document.getElementById('mandalartTitle').value.trim();
      const dueDate = normalizeDateText(document.getElementById('mandalartDue').value);
      const centerInput = document.getElementById('mandalartCenter').value.trim();
      if (!titleInput && !centerInput) return;
      const title = titleInput || centerInput;
      const center = centerInput || titleInput;

      const cells = Array.from({ length: 9 }).map((_, idx) => ({
        id: uid(),
        text: idx === 4 ? center : '',
        linkedGoalId: '',
        linkedTodoIds: []
      }));

      state.mandalarts.unshift({
        id: uid(),
        title,
        dueDate,
        cells,
        collapsed: false,
        createdAt: Date.now()
      });

      document.getElementById('mandalartTitle').value = '';
      document.getElementById('mandalartDue').value = '';
      document.getElementById('mandalartCenter').value = '';
      saveState();
      renderGoals();
    }

    function saveMandalart(id) {
      const item = state.mandalarts.find(m => m.id === id);
      if (!item) return;
      const titleInput = document.getElementById(`mandalart-title-${id}`);
      const dueInput = document.getElementById(`mandalart-due-${id}`);
      const nextTitle = titleInput ? titleInput.value.trim() : item.title;
      if (!nextTitle) return;
      item.title = nextTitle;
      item.dueDate = normalizeDateText(dueInput?.value) || null;

      item.cells = item.cells.map((cell, idx) => {
        const textEl = document.getElementById(`mandalart-cell-${id}-${idx}`);
        const goalEl = document.getElementById(`mandalart-goal-${id}-${idx}`);
        const todoEl = document.getElementById(`mandalart-todo-${id}-${idx}`);
        const nextGoal = goalEl ? goalEl.value : '';
        const nextTodo = todoEl ? todoEl.value : '';
        return {
          ...cell,
          text: textEl ? textEl.value.trim() : cell.text,
          linkedGoalId: nextGoal ? nextGoal : cell.linkedGoalId,
          linkedTodoIds: nextTodo ? [nextTodo] : (cell.linkedTodoIds || [])
        };
      });

      if (!item.cells[4].text) item.cells[4].text = item.title;
      saveState();
      renderGoals();
    }

    function removeMandalart(id) {
      state.mandalarts = state.mandalarts.filter(m => m.id !== id);
      saveState();
      renderGoals();
    }

    function toggleMandalart(id) {
      const item = state.mandalarts.find(m => m.id === id);
      if (!item) return;
      item.collapsed = !item.collapsed;
      saveState();
      renderGoals();
    }

    function addRoutine() {
      const title = document.getElementById('routineTitle').value.trim();
      if (!title) return;
      state.routines.unshift({ id: uid(), title, doneDates: {}, createdAt: Date.now() });
      document.getElementById('routineTitle').value = '';
      saveState();
      renderRoutine();
      renderFocus();
      renderStats();
    }

    function toggleRoutine(routineId) {
      const r = state.routines.find(x => x.id === routineId);
      if (!r) return;
      const d = today();
      if (r.doneDates[d]) delete r.doneDates[d];
      else r.doneDates[d] = true;
      saveState();
      renderRoutine();
      renderFocus();
      renderStats();
    }

    function renderTaskList(container, items, emptyText) {
      container.innerHTML = '';
      if (!items.length) {
        const div = document.createElement('div');
        div.className = 'meta';
        div.textContent = emptyText;
        container.appendChild(div);
        return;
      }

      items.forEach(task => {
        const row = document.createElement('div');
        row.className = `item ${task.status === 'done' ? 'done' : ''}`;
        row.innerHTML = `
          <div class="item-left">
            <button class="check ${task.status === 'done' ? 'checked' : ''}" data-action="toggle-task" data-id="${task.id}" aria-label="할일 완료 상태 변경"></button>
            <div>
              <div class="label">${escapeHtml(task.title)}</div>
              <div class="tiny">${task.dueDate}</div>
            </div>
          </div>
          <div class="tiny">${task.status === 'done' ? '완료' : '진행중'}</div>
        `;
        container.appendChild(row);
      });
    }

    function taskCountByDate() {
      const map = {};
      state.tasks.forEach(task => {
        const key = normalizeDateText(task.dueDate) || today();
        map[key] = (map[key] || 0) + 1;
      });
      return map;
    }

    function renderCalendar() {
      const monthText = state.ui.calendarMonth;
      const [y, m] = monthText.split('-').map(Number);
      const firstDay = new Date(y, m - 1, 1);
      const startOffset = firstDay.getDay();
      const startDate = new Date(y, m - 1, 1 - startOffset);
      const grid = document.getElementById('calendarGrid');
      const counts = taskCountByDate();

      document.getElementById('calendarMonthLabel').textContent = `${y}년 ${m}월`;
      grid.innerHTML = '';

      for (let i = 0; i < 42; i++) {
        const day = new Date(startDate);
        day.setDate(startDate.getDate() + i);
        const dayKey = formatDate(day);
        const isCurrentMonth = day.getMonth() === (m - 1);
        const isSelected = dayKey === state.ui.selectedDate;
        const count = counts[dayKey] || 0;

        const btn = document.createElement('button');
        btn.className = `day-btn ${isCurrentMonth ? '' : 'muted'} ${isSelected ? 'selected' : ''}`;
        btn.type = 'button';
        btn.dataset.action = 'select-date';
        btn.dataset.date = dayKey;
        btn.innerHTML = `<span>${day.getDate()}</span>${count > 0 ? `<span class="day-dot"></span><span class="day-count">${count}개</span>` : '<span class="day-count">&nbsp;</span>'}`;
        grid.appendChild(btn);
      }
    }

    function renderTasks() {
      document.getElementById('selectedDateLabel').textContent = state.ui.selectedDate;
      document.getElementById('taskDue').value = state.ui.selectedDate;
      renderCalendar();
      renderTaskList(
        document.getElementById('selectedTaskList'),
        getSelectedDateTasks(),
        '선택한 날짜의 할일이 없습니다'
      );
    }

    function renderGoalGroup(container, goals) {
      container.innerHTML = '';
      if (!goals.length) {
        container.innerHTML = '<div class="meta">등록된 목표가 없습니다</div>';
        return;
      }

      goals.forEach(goal => {
        const p = progressPercent(goal.progress, goal.target);
        const row = document.createElement('div');
        row.className = 'item';
        row.style.display = 'block';
        row.innerHTML = `
          <div class="row"><strong>${escapeHtml(goal.title)}</strong><span class="tiny">${goal.progress} / ${goal.target}</span></div>
          <div class="progress"><span style="width:${p}%"></span></div>
          <div class="tiny" style="margin-top:6px;">${goal.deadline || '마감일 없음'}</div>
        `;
        container.appendChild(row);
      });
    }

    function renderGoals() {
      ensureGoalHierarchy();
      refreshAllGoalProgress();
      renderGoalSelects();
      const container = document.getElementById('goalHierarchyList');
      if (!container) return;
      container.innerHTML = '';

      const yearlyGoals = state.goals.filter(g => g.type === 'yearly').sort((a, b) => b.createdAt - a.createdAt);
      if (!yearlyGoals.length) {
        container.innerHTML = '<div class="meta">연간 목표를 먼저 만들어 주세요</div>';
        return;
      }

      yearlyGoals.forEach(yearly => {
        const monthlyGoals = state.goals
          .filter(g => g.type === 'monthly' && g.parentGoalId === yearly.id)
          .sort((a, b) => b.createdAt - a.createdAt);
        const yearlyPercent = progressPercent(yearly.progress, yearly.target);
        const block = document.createElement('div');
        block.className = 'item';
        block.style.display = 'block';
        block.innerHTML = `
          <div class="row"><strong>${escapeHtml(yearly.title)}</strong><span class="tiny">${yearlyPercent}%</span></div>
          <div class="progress"><span style="width:${yearlyPercent}%"></span></div>
          <div class="tiny" style="margin-top:6px;">${yearly.deadline || '마감일 없음'}</div>
          <div class="divider"></div>
          <div class="list" id="monthly-by-${yearly.id}"></div>
        `;
        container.appendChild(block);
        const monthlyContainer = block.querySelector(`#monthly-by-${yearly.id}`);
        if (!monthlyGoals.length) {
          monthlyContainer.innerHTML = '<div class="meta">연결된 월간 목표가 없습니다</div>';
        } else {
          renderGoalGroup(monthlyContainer, monthlyGoals);
        }
      });
    }

    function renderRoutine() {
      const list = document.getElementById('routineList');
      list.innerHTML = '';
      if (!state.routines.length) {
        list.innerHTML = '<div class="meta">루틴이 아직 없습니다</div>';
        return;
      }
      const d = today();
      state.routines.forEach(r => {
        const done = !!r.doneDates[d];
        const row = document.createElement('div');
        row.className = 'item';
        row.innerHTML = `
          <div class="item-left">
            <button class="check ${done ? 'checked' : ''}" data-action="toggle-routine" data-id="${r.id}" aria-label="루틴 완료 상태 변경"></button>
            <div class="label">${escapeHtml(r.title)}</div>
          </div>
        `;
        list.appendChild(row);
      });
    }

    function renderFocus() {
      ensureGoalHierarchy();
      refreshAllGoalProgress();
      const yearly = state.goals.filter(g => g.type === 'yearly').sort((a, b) => b.createdAt - a.createdAt)[0];
      const monthly = yearly
        ? state.goals.filter(g => g.type === 'monthly' && g.parentGoalId === yearly.id).sort((a, b) => b.createdAt - a.createdAt)[0]
        : null;
      const yearlyTitle = document.getElementById('focusYearlyTitle');
      const yearlyValue = document.getElementById('focusYearlyValue');
      const yearlyBar = document.getElementById('focusYearlyBar');
      const monthlyTitle = document.getElementById('focusMonthlyTitle');

      if (!yearly) {
        yearlyTitle.textContent = '연간 목표가 없습니다';
        yearlyValue.textContent = '0%';
        yearlyBar.style.width = '0%';
        monthlyTitle.textContent = '대표 월간 목표가 없습니다';
      } else {
        const percent = progressPercent(yearly.progress, yearly.target);
        yearlyTitle.textContent = yearly.title;
        yearlyValue.textContent = `${percent}%`;
        yearlyBar.style.width = `${percent}%`;
        monthlyTitle.textContent = monthly
          ? `대표 월간 목표: ${monthly.title} (${progressPercent(monthly.progress, monthly.target)}%)`
          : '대표 월간 목표가 없습니다';
      }

      document.getElementById('focusTodayRemain').textContent = String(getTodayTasks().length);
      const routineRate = calcRoutineRateToday();
      document.getElementById('focusRoutineValue').textContent = `${routineRate}%`;
      document.getElementById('focusRoutineBar').style.width = `${routineRate}%`;
      document.getElementById('focusInsight').textContent = state.ai.dailyInsight || '아직 오늘의 제안이 없습니다';
    }

    function calcFocusScore() {
      const total = state.tasks.length;
      const done = getDoneTasksCount();
      const taskRate = total ? Math.round((done / total) * 100) : 0;
      const routineRate = calcRoutineRateToday();
      return Math.round((taskRate * 0.6) + (routineRate * 0.4));
    }

    function buildWeeklyStats() {
      const totalTodos = state.tasks.length;
      const completedTodos = getDoneTasksCount();
      const routineCompletionRate = calcRoutineRateToday();
      const monthlyGoals = state.goals.filter(g => g.type === 'monthly');
      const weeklyGoalsCompleted = monthlyGoals.filter(g => g.progress >= g.target).length;

      return {
        completedTodos,
        totalTodos,
        routineCompletionRate,
        weeklyGoalsCompleted,
        weeklyGoalsTotal: monthlyGoals.length
      };
    }

    function renderStats() {
      const stats = buildWeeklyStats();
      document.getElementById('focusScore').textContent = String(calcFocusScore());
      document.getElementById('statCompleted').textContent = String(stats.completedTodos);
      document.getElementById('statTotal').textContent = String(stats.totalTodos);
      document.getElementById('statRoutineRate').textContent = `${stats.routineCompletionRate}%`;
      document.getElementById('statWeeklyGoals').textContent = `${stats.weeklyGoalsCompleted} / ${stats.weeklyGoalsTotal}`;
      document.getElementById('weeklyCoachText').textContent = state.ai.weeklyReview || '아직 주간 회고가 없습니다';
    }

    function renderChat() {
      const list = document.getElementById('chatList');
      list.innerHTML = '';

      if (!state.ai.chatHistory.length) {
        const empty = document.createElement('div');
        empty.className = 'meta';
        empty.textContent = '질문을 보내면 인공지능 비서가 답변을 드립니다';
        list.appendChild(empty);
        return;
      }

      state.ai.chatHistory.forEach(message => {
        const item = document.createElement('div');
        item.className = `chat-item ${message.role === 'assistant' ? '' : 'user'}`;
        item.textContent = `${message.role === 'assistant' ? '비서' : '나'}: ${message.text}`;
        list.appendChild(item);
      });
      list.scrollTop = list.scrollHeight;
    }

    async function sendChat() {
      const input = document.getElementById('chatInput');
      const text = input.value.trim();
      if (!text) return;

      state.ai.chatHistory.push({ role: 'user', text });
      state.ai.chatHistory = state.ai.chatHistory.slice(-40);
      input.value = '';
      renderChat();
      document.getElementById('goalParent').style.display = document.getElementById('goalType').value === 'monthly' ? 'block' : 'none';
      saveState();

      try {
        const response = await fetch('/api/ai', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            mode: 'chat',
            payload: {
              message: `다음 질문에 한국어로 간결하게 답변해 주세요. 질문: ${text}`,
              history: state.ai.chatHistory.slice(-20).map(msg => ({ role: msg.role, content: msg.text }))
            }
          })
        });

        const data = await response.json();
        const reply = String(data.reply || '현재 답변을 준비하지 못했습니다. 잠시 후 다시 시도해 주세요.');
        state.ai.chatHistory.push({ role: 'assistant', text: reply });
      } catch {
        state.ai.chatHistory.push({ role: 'assistant', text: '연결이 불안정하여 답변을 받지 못했습니다. 다시 시도해 주세요.' });
      }

      state.ai.chatHistory = state.ai.chatHistory.slice(-40);
      saveState();
      renderChat();
      document.getElementById('goalParent').style.display = document.getElementById('goalType').value === 'monthly' ? 'block' : 'none';
    }

    async function requestDailyInsight() {
      if (state.ai.dailyInsightDate === today() && state.ai.dailyInsight) return;

      try {
        const response = await fetch('/api/ai', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            mode: 'daily-insight',
            payload: {
              message: '오늘 실천할 수 있는 짧은 생산성 제안을 한국어로 1개만 작성해 주세요.'
            }
          })
        });

        const data = await response.json();
        state.ai.dailyInsight = String(data.reply || '중요한 일 한 가지를 15분만 먼저 시작해 보세요.').slice(0, 180);
        state.ai.dailyInsightDate = today();
        saveState();
      } catch {
        if (!state.ai.dailyInsight) state.ai.dailyInsight = '중요한 일 한 가지를 15분만 먼저 시작해 보세요.';
      }
    }

    function buildWeeklyReviewPrompt(stats) {
      return `다음 데이터를 바탕으로 주간 생산성 회고를 한국어로 작성해 주세요.\n\n구성:\n1. 전체 평가\n2. 잘한 점\n3. 개선할 점\n4. 다음 주 제안\n5. 이번 주 핵심 한 가지\n\n데이터:\n완료한 할일=${stats.completedTodos}\n전체 할일=${stats.totalTodos}\n루틴 완료율=${stats.routineCompletionRate}\n완료한 월간 목표=${stats.weeklyGoalsCompleted}\n전체 월간 목표=${stats.weeklyGoalsTotal}`;
    }

    async function maybeRunWeeklyReview() {
      const currentWeek = weekKey(new Date());
      if (state.ai.weeklyReviewWeekKey === currentWeek) return;
      if (new Date().getDay() === 0) return;

      const stats = buildWeeklyStats();
      try {
        const response = await fetch('/api/ai', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            mode: 'weekly-review',
            payload: {
              message: buildWeeklyReviewPrompt(stats),
              history: []
            }
          })
        });

        const data = await response.json();
        state.ai.weeklyReview = String(data.reply || '주간 회고를 불러오지 못했습니다.');
        state.ai.weeklyReviewWeekKey = currentWeek;
        saveState();
      } catch {
        if (!state.ai.weeklyReview) state.ai.weeklyReview = '주간 회고를 불러오지 못했습니다.';
      }
    }

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function renderCurrentTab() {
      if (state.ui.tab === 'focus') renderFocus();
      if (state.ui.tab === 'tasks') renderTasks();
      if (state.ui.tab === 'goals') renderGoals();
      if (state.ui.tab === 'routine') renderRoutine();
      if (state.ui.tab === 'stats') renderStats();
    }

    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => setTab(btn.dataset.tab));
    });

    document.addEventListener('click', (e) => {
      const actionEl = e.target.closest('[data-action]');
      if (!actionEl) return;

      const action = actionEl.dataset.action;
      const id = actionEl.dataset.id;

      if (action === 'toggle-task') toggleTask(id);
      if (action === 'toggle-routine') toggleRoutine(id);
      if (action === 'select-date') setSelectedDate(actionEl.dataset.date);
      if (action === 'save-mandalart') saveMandalart(id);
      if (action === 'delete-mandalart') removeMandalart(id);
      if (action === 'toggle-mandalart') toggleMandalart(id);
    });

    document.getElementById('addTaskBtn').addEventListener('click', addTask);
    document.getElementById('taskTitle').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') addTask();
    });

    document.getElementById('taskDue').addEventListener('change', (e) => {
      const next = normalizeDateText(e.target.value);
      if (next) setSelectedDate(next);
    });

    document.getElementById('todayDateBtn').addEventListener('click', () => setSelectedDate(today()));
    document.getElementById('prevDateBtn').addEventListener('click', () => setSelectedDate(shiftDate(state.ui.selectedDate, -1)));
    document.getElementById('nextDateBtn').addEventListener('click', () => setSelectedDate(shiftDate(state.ui.selectedDate, 1)));
    document.getElementById('prevMonthBtn').addEventListener('click', () => {
      const [y, m] = state.ui.calendarMonth.split('-').map(Number);
      const prev = new Date(y, m - 2, 1);
      state.ui.calendarMonth = `${prev.getFullYear()}-${String(prev.getMonth() + 1).padStart(2, '0')}`;
      saveState();
      renderCalendar();
    });
    document.getElementById('nextMonthBtn').addEventListener('click', () => {
      const [y, m] = state.ui.calendarMonth.split('-').map(Number);
      const next = new Date(y, m, 1);
      state.ui.calendarMonth = `${next.getFullYear()}-${String(next.getMonth() + 1).padStart(2, '0')}`;
      saveState();
      renderCalendar();
    });

    document.getElementById('addGoalBtn').addEventListener('click', addGoal);
    document.getElementById('taskYearlyGoal').addEventListener('change', renderTaskMonthlyGoalOptions);
    document.getElementById('goalType').addEventListener('change', (e) => {
      const parent = document.getElementById('goalParent');
      parent.style.display = e.target.value === 'monthly' ? 'block' : 'none';
    });
    document.getElementById('addRoutineBtn').addEventListener('click', addRoutine);
    document.getElementById('routineTitle').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') addRoutine();
    });

    document.getElementById('openAiBtn').addEventListener('click', () => {
      document.getElementById('aiModal').classList.add('open');
      renderChat();
    });
    document.getElementById('closeAiBtn').addEventListener('click', () => {
      document.getElementById('aiModal').classList.remove('open');
    });
    document.getElementById('sendChatBtn').addEventListener('click', sendChat);
    document.getElementById('chatInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendChat();
      }
    });

    async function init() {
      ensureGoalHierarchy();
      refreshAllGoalProgress();
      setTab(state.ui.tab);
      renderTasks();
      renderGoals();
      renderRoutine();
      renderFocus();
      renderStats();
      renderChat();
      document.getElementById('goalParent').style.display = document.getElementById('goalType').value === 'monthly' ? 'block' : 'none';
      await requestDailyInsight();
      await maybeRunWeeklyReview();
      renderFocus();
      renderStats();
    }

    init();
  </script>
</body>
</html>
