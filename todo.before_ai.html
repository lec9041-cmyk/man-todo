<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Focus Planner | TODO + Mandalart</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --ink: #0f172a;
      --muted: #64748b;
      --line: #dbe4ee;
      --brand: #0f766e;
      --brand-2: #0ea5a4;
      --danger: #dc2626;
      --shadow: 0 16px 30px rgba(15, 23, 42, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", "Malgun Gothic", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 14% 7%, #ccfbf1 0%, transparent 24%),
        radial-gradient(circle at 88% 2%, #dbeafe 0%, transparent 26%),
        var(--bg);
      padding: 16px;
    }

    .app {
      width: min(1060px, 100%);
      margin: 0 auto;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 18px;
      box-shadow: var(--shadow);
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 14px;
    }

    h1 { margin: 0; font-size: clamp(26px, 4vw, 36px); letter-spacing: -0.02em; }
    .sub { margin: 6px 0 0; color: var(--muted); font-size: 14px; }

    .tabs {
      display: inline-flex;
      background: #eef2ff;
      padding: 4px;
      border-radius: 999px;
      border: 1px solid #dbeafe;
      gap: 4px;
    }

    .tab-btn {
      border: 0;
      background: transparent;
      border-radius: 999px;
      padding: 9px 14px;
      font-weight: 800;
      cursor: pointer;
      color: #334155;
    }

    .tab-btn.active {
      background: #fff;
      color: var(--brand);
      box-shadow: 0 4px 10px rgba(15, 23, 42, 0.08);
    }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    .panel {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 12px;
      background: #f8fbff;
      margin-bottom: 12px;
    }

    input, select, button, textarea {
      border: 1px solid var(--line);
      border-radius: 12px;
      font-size: 14px;
      padding: 10px 11px;
      background: #fff;
      color: var(--ink);
    }

    textarea { resize: vertical; min-height: 76px; }

    input:focus, select:focus, textarea:focus {
      outline: 2px solid #99f6e4;
      border-color: #5eead4;
    }

    button { cursor: pointer; font-weight: 700; }

    .btn-primary {
      background: linear-gradient(135deg, var(--brand-2), var(--brand));
      color: #fff;
      border-color: transparent;
    }

    .btn-ghost { background: #fff; }
    .btn-danger { color: var(--danger); border-color: #fecaca; background: #fff; }

    .todo-add {
      display: grid;
      grid-template-columns: 1.3fr auto auto auto auto;
      gap: 8px;
    }

    .toolbar {
      margin-top: 8px;
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 8px;
      align-items: center;
    }

    .chips { display: flex; gap: 6px; flex-wrap: wrap; }

    .chip {
      border-radius: 999px;
      border: 1px solid #cbd5e1;
      background: #fff;
      padding: 7px 11px;
      font-size: 12px;
      font-weight: 700;
      color: #334155;
    }

    .chip.active { background: #0f172a; color: #fff; border-color: #0f172a; }

    .stats { color: var(--muted); font-size: 14px; margin-top: 10px; }

    .progress {
      margin-top: 6px;
      height: 9px;
      background: #e2e8f0;
      border-radius: 999px;
      overflow: hidden;
    }

    .bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--brand-2), #22d3ee);
      transition: width .25s ease;
    }

    .focus-panel {
      border: 1px solid #bee3f8;
      background: #effbff;
      border-radius: 14px;
      padding: 10px;
      margin-bottom: 10px;
    }

    .focus-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    .focus-title { font-size: 14px; font-weight: 800; color: #0f766e; }
    .focus-sub { font-size: 12px; color: #0e7490; }
    .focus-list { display: grid; gap: 6px; }

    .focus-item {
      border: 1px solid #bae6fd;
      border-radius: 10px;
      background: #fff;
      padding: 8px;
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
      font-size: 13px;
    }

    .focus-item small { color: var(--muted); }

    .linked-filter {
      margin-top: 8px;
      border: 1px solid #a5f3fc;
      background: #ecfeff;
      color: #0f766e;
      border-radius: 10px;
      font-size: 13px;
      padding: 8px 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    ul { list-style: none; padding: 0; margin: 12px 0 0; display: grid; gap: 8px; }

    .item {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      padding: 10px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 10px;
      align-items: start;
    }

    .item.done .title { text-decoration: line-through; color: #94a3b8; }
    .title { font-weight: 700; margin-bottom: 5px; word-break: break-word; }

    .meta { display: flex; gap: 6px; flex-wrap: wrap; }

    .tag {
      border: 1px solid #dbeafe;
      background: #f8fafc;
      color: #334155;
      border-radius: 999px;
      font-size: 12px;
      padding: 3px 8px;
    }

    .actions { display: flex; gap: 6px; flex-wrap: wrap; justify-content: flex-end; }

    .pin-btn.active {
      background: #fef3c7;
      border-color: #fcd34d;
      color: #92400e;
    }

    .edit-box {
      border: 1px solid #dbeafe;
      border-radius: 10px;
      background: #f8fafc;
      padding: 8px;
      display: grid;
      gap: 6px;
    }

    .edit-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 6px;
    }

    .empty {
      margin-top: 10px;
      border: 1px dashed #cbd5e1;
      border-radius: 10px;
      padding: 12px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
    }

    .bottom { margin-top: 10px; display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }

    .backup-row {
      margin-top: 10px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-start;
    }

    .manda-head {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      margin-bottom: 10px;
    }

    .manda-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .manda-cell {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 12px;
      padding: 8px;
      min-height: 170px;
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      gap: 6px;
      transition: border-color .15s ease, box-shadow .15s ease;
    }

    .manda-cell.linkable { cursor: pointer; }
    .manda-cell.linkable:hover { border-color: #7dd3fc; box-shadow: 0 0 0 2px #e0f2fe inset; }

    .manda-cell.center {
      background: linear-gradient(135deg, #ecfeff, #eef2ff);
      border-color: #a5f3fc;
    }

    .cell-title { font-size: 12px; color: var(--muted); font-weight: 800; }

    .cell-badge {
      border: 1px solid #bae6fd;
      background: #f0f9ff;
      color: #0369a1;
      border-radius: 999px;
      font-size: 11px;
      padding: 3px 8px;
      width: fit-content;
    }

    .hint {
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    @media (max-width: 920px) {
      .todo-add { grid-template-columns: 1fr 1fr; }
      .toolbar { grid-template-columns: 1fr; }
    }

    @media (max-width: 720px) {
      .item { grid-template-columns: auto 1fr; }
      .actions { grid-column: 1 / -1; justify-content: flex-start; }
      .edit-grid { grid-template-columns: 1fr; }
      .manda-grid { grid-template-columns: 1fr; }
      .manda-head { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="top">
      <div>
        <h1>Focus Planner</h1>
        <p class="sub">할일 탭과 만다라트 탭을 연결해서, 목표에서 바로 실행 항목을 만듭니다.</p>
      </div>
      <div class="tabs" role="tablist" aria-label="뷰 전환">
        <button class="tab-btn active" data-tab="todo" role="tab" aria-selected="true">할일</button>
        <button class="tab-btn" data-tab="mandala" role="tab" aria-selected="false">만다라트</button>
      </div>
    </section>

    <section id="todoPanel" class="tab-panel active">
      <div class="panel">
        <div class="todo-add">
          <input id="todoText" type="text" placeholder="할 일 입력 (예: 포트폴리오 1페이지 정리)" maxlength="140" />
          <input id="todoDue" type="date" />
          <select id="todoPriority">
            <option value="high">우선순위 높음</option>
            <option value="mid" selected>우선순위 중간</option>
            <option value="low">우선순위 낮음</option>
          </select>
          <select id="todoCategory">
            <option value="general" selected>카테고리: 일반</option>
            <option value="study">카테고리: 공부</option>
            <option value="work">카테고리: 일</option>
            <option value="health">카테고리: 건강</option>
            <option value="mandala">카테고리: 만다라트</option>
          </select>
          <button id="addTodoBtn" class="btn-primary">추가</button>
        </div>

        <div class="toolbar">
          <input id="searchInput" type="search" placeholder="할 일 검색" />
          <select id="sortInput">
            <option value="created">정렬: 최신 추가순</option>
            <option value="due">정렬: 마감일 빠른순</option>
            <option value="priority">정렬: 우선순위순</option>
          </select>
          <div id="filterChips" class="chips">
            <button class="chip active" data-filter="all">전체</button>
            <button class="chip" data-filter="active">진행중</button>
            <button class="chip" data-filter="done">완료</button>
            <button class="chip" data-filter="mandala">만다라트 연동</button>
          </div>
        </div>

        <div id="linkedFilterInfo" class="linked-filter" style="display:none;">
          <span id="linkedFilterText"></span>
          <button id="clearLinkedFilterBtn" class="btn-ghost">연결 필터 해제</button>
        </div>

        <div id="stats" class="stats">총 0개 / 완료 0개 / 남음 0개</div>
        <div class="progress"><div id="progressBar" class="bar"></div></div>
      </div>

      <section class="focus-panel" id="focusPanel">
        <div class="focus-head">
          <div>
            <div class="focus-title">오늘의 3개</div>
            <div class="focus-sub">TODO 카드의 ⭐ 버튼으로 오늘 할 일을 고정하세요.</div>
          </div>
          <button id="focusMoreBtn" class="btn-ghost" style="display:none;">더보기</button>
        </div>
        <div id="focusList" class="focus-list"></div>
      </section>

      <ul id="todoList"></ul>
      <div id="todoEmpty" class="empty">아직 할 일이 없어요. 만다라트 탭에서 목표를 쪼개서 가져와도 됩니다.</div>

      <div class="bottom">
        <button id="markAllBtn" class="btn-ghost">전체 완료</button>
        <button id="clearDoneBtn" class="btn-ghost">완료만 삭제</button>
        <button id="clearAllBtn" class="btn-danger">전체 삭제</button>
      </div>

      <div class="backup-row">
        <button id="exportBtn" class="btn-ghost">JSON 내보내기</button>
        <button id="importBtn" class="btn-ghost">JSON 가져오기</button>
        <input id="importFileInput" type="file" accept="application/json,.json" style="display:none;" />
      </div>
    </section>

    <section id="mandalaPanel" class="tab-panel">
      <div class="panel">
        <div class="manda-head">
          <input id="coreGoalInput" type="text" placeholder="중심 목표 (예: 3개월 안에 취업 포트폴리오 완성)" maxlength="120" />
          <button id="saveCoreBtn" class="btn-primary">중심 목표 저장</button>
        </div>

        <div id="mandalaGrid" class="manda-grid"></div>

        <div class="bottom" style="justify-content:flex-start;margin-top:12px;">
          <button id="addAllMandalaBtn" class="btn-primary">8개 모두 할일로 추가</button>
          <button id="clearMandalaBtn" class="btn-danger">만다라트 초기화</button>
        </div>

        <p class="hint">
          사용법: 중심 목표를 적고 주변 8칸에 실행 아이디어를 작성한 뒤, 각 칸의 할일로 추가를 누르세요.
          칸을 클릭하면 해당 칸과 연결된 할일만 TODO 탭에서 볼 수 있습니다.
        </p>
      </div>
    </section>
  </main>

  <script>
    const STORAGE_KEY = "focus_planner_v3";

    const priorityRank = { high: 3, mid: 2, low: 1 };
    const priorityLabel = { high: "높음", mid: "중간", low: "낮음" };
    const categoryLabel = {
      general: "일반",
      study: "공부",
      work: "일",
      health: "건강",
      mandala: "만다라트"
    };

    const gridSlots = [
      { kind: "sub", index: 0 },
      { kind: "sub", index: 1 },
      { kind: "sub", index: 2 },
      { kind: "sub", index: 3 },
      { kind: "core", index: null },
      { kind: "sub", index: 4 },
      { kind: "sub", index: 5 },
      { kind: "sub", index: 6 },
      { kind: "sub", index: 7 }
    ];

    const els = {
      tabButtons: document.querySelectorAll(".tab-btn"),
      todoPanel: document.getElementById("todoPanel"),
      mandalaPanel: document.getElementById("mandalaPanel"),

      todoText: document.getElementById("todoText"),
      todoDue: document.getElementById("todoDue"),
      todoPriority: document.getElementById("todoPriority"),
      todoCategory: document.getElementById("todoCategory"),
      addTodoBtn: document.getElementById("addTodoBtn"),

      searchInput: document.getElementById("searchInput"),
      sortInput: document.getElementById("sortInput"),
      filterChips: document.getElementById("filterChips"),
      linkedFilterInfo: document.getElementById("linkedFilterInfo"),
      linkedFilterText: document.getElementById("linkedFilterText"),
      clearLinkedFilterBtn: document.getElementById("clearLinkedFilterBtn"),

      stats: document.getElementById("stats"),
      progressBar: document.getElementById("progressBar"),
      todoList: document.getElementById("todoList"),
      todoEmpty: document.getElementById("todoEmpty"),

      focusPanel: document.getElementById("focusPanel"),
      focusList: document.getElementById("focusList"),
      focusMoreBtn: document.getElementById("focusMoreBtn"),

      markAllBtn: document.getElementById("markAllBtn"),
      clearDoneBtn: document.getElementById("clearDoneBtn"),
      clearAllBtn: document.getElementById("clearAllBtn"),

      exportBtn: document.getElementById("exportBtn"),
      importBtn: document.getElementById("importBtn"),
      importFileInput: document.getElementById("importFileInput"),

      coreGoalInput: document.getElementById("coreGoalInput"),
      saveCoreBtn: document.getElementById("saveCoreBtn"),
      mandalaGrid: document.getElementById("mandalaGrid"),
      addAllMandalaBtn: document.getElementById("addAllMandalaBtn"),
      clearMandalaBtn: document.getElementById("clearMandalaBtn")
    };

    // State schema (persisted): todo.items + mandala core/cells. runtime UI state는 todo 객체에 함께 유지.
    const state = loadState();

    initialize();

    function initialize() {
      bindTabSwitching();
      bindTodoEvents();
      bindMandalaEvents();
      bindBackupEvents();
      renderAll();
    }

    function bindTabSwitching() {
      for (const btn of els.tabButtons) {
        btn.addEventListener("click", () => setActiveTab(btn.dataset.tab));
      }
    }

    function setActiveTab(target) {
      for (const b of els.tabButtons) {
        const active = b.dataset.tab === target;
        b.classList.toggle("active", active);
        b.setAttribute("aria-selected", String(active));
      }
      els.todoPanel.classList.toggle("active", target === "todo");
      els.mandalaPanel.classList.toggle("active", target === "mandala");
    }

    function bindTodoEvents() {
      els.addTodoBtn.addEventListener("click", addTodoFromInput);
      els.todoText.addEventListener("keydown", (event) => {
        if (event.key === "Enter") addTodoFromInput();
      });

      els.searchInput.addEventListener("input", (event) => {
        state.todo.search = event.target.value.trim().toLowerCase();
        state.todo.linkedCellFilter = null;
        renderTodo();
      });

      els.sortInput.addEventListener("change", (event) => {
        state.todo.sort = event.target.value;
        renderTodo();
      });

      els.filterChips.addEventListener("click", (event) => {
        const btn = event.target.closest("button[data-filter]");
        if (!btn) return;
        state.todo.filter = btn.dataset.filter;
        state.todo.linkedCellFilter = null;
        state.todo.editingId = null;
        syncFilterChips();
        renderTodo();
      });

      els.clearLinkedFilterBtn.addEventListener("click", () => {
        state.todo.linkedCellFilter = null;
        renderTodo();
      });

      els.focusMoreBtn.addEventListener("click", () => {
        state.todo.focusExpanded = !state.todo.focusExpanded;
        renderFocusPanel();
      });

      els.markAllBtn.addEventListener("click", () => {
        if (state.todo.items.length === 0) return;
        state.todo.items = state.todo.items.map((item) => ({ ...item, done: true }));
        persist();
        renderAll();
      });

      els.clearDoneBtn.addEventListener("click", () => {
        const before = state.todo.items.length;
        state.todo.items = state.todo.items.filter((item) => !item.done);
        if (before === state.todo.items.length) {
          alert("완료된 항목이 없습니다.");
          return;
        }
        if (state.todo.editingId && !state.todo.items.some((item) => item.id === state.todo.editingId)) {
          state.todo.editingId = null;
        }
        persist();
        renderAll();
      });

      els.clearAllBtn.addEventListener("click", () => {
        if (state.todo.items.length === 0) return;
        if (!confirm("전체 항목을 삭제할까요?")) return;
        state.todo.items = [];
        state.todo.editingId = null;
        persist();
        renderAll();
      });
    }

    function bindMandalaEvents() {
      els.saveCoreBtn.addEventListener("click", () => {
        state.mandala.core = els.coreGoalInput.value.trim();
        persist();
        renderMandala();
      });

      els.addAllMandalaBtn.addEventListener("click", () => {
        let added = 0;
        state.mandala.cells.forEach((text, i) => {
          if (text.trim()) {
            addTodoFromMandala(text.trim(), i);
            added += 1;
          }
        });
        if (added === 0) {
          alert("먼저 만다라트 칸에 내용을 입력하세요.");
          return;
        }
        persist();
        renderAll();
        alert(`${added}개 항목을 할일에 추가했습니다.`);
      });

      els.clearMandalaBtn.addEventListener("click", () => {
        if (!confirm("만다라트 내용을 초기화할까요?")) return;
        state.mandala.core = "";
        state.mandala.cells = Array(8).fill("");
        persist();
        renderMandala();
      });
    }

    function bindBackupEvents() {
      els.exportBtn.addEventListener("click", exportJson);
      els.importBtn.addEventListener("click", () => {
        els.importFileInput.value = "";
        els.importFileInput.click();
      });
      els.importFileInput.addEventListener("change", importJsonFile);
    }

    function addTodoFromInput() {
      const text = els.todoText.value.trim();
      if (!text) {
        els.todoText.focus();
        return;
      }

      state.todo.items.unshift({
        id: crypto.randomUUID(),
        text,
        dueDate: els.todoDue.value || null,
        priority: els.todoPriority.value,
        category: els.todoCategory.value,
        done: false,
        today: false,
        source: null,
        createdAt: Date.now()
      });

      els.todoText.value = "";
      persist();
      renderAll();
      els.todoText.focus();
    }

    function addTodoFromMandala(text, cellIndex) {
      state.todo.items.unshift({
        id: crypto.randomUUID(),
        text,
        dueDate: null,
        priority: "mid",
        category: "mandala",
        done: false,
        today: false,
        source: {
          type: "mandala",
          cellIndex,
          core: state.mandala.core || null
        },
        createdAt: Date.now()
      });
    }

    function toggleTodo(id) {
      state.todo.items = state.todo.items.map((item) =>
        item.id === id ? { ...item, done: !item.done } : item
      );
      persist();
      renderAll();
    }

    function toggleToday(id) {
      state.todo.items = state.todo.items.map((item) =>
        item.id === id ? { ...item, today: !item.today } : item
      );
      persist();
      renderAll();
    }

    function startInlineEdit(id) {
      state.todo.editingId = id;
      renderTodo();
    }

    // 인라인 편집 저장: prompt 없이 카드 안 입력값(text/due/priority/category) 반영.
    function saveInlineEdit(id, liElement) {
      const textInput = liElement.querySelector('[data-edit="text"]');
      const dueInput = liElement.querySelector('[data-edit="due"]');
      const priorityInput = liElement.querySelector('[data-edit="priority"]');
      const categoryInput = liElement.querySelector('[data-edit="category"]');

      const text = textInput.value.trim();
      if (!text) {
        alert("할 일 텍스트를 입력하세요.");
        textInput.focus();
        return;
      }

      state.todo.items = state.todo.items.map((item) => {
        if (item.id !== id) return item;
        return {
          ...item,
          text,
          dueDate: dueInput.value || null,
          priority: priorityInput.value,
          category: categoryInput.value
        };
      });

      state.todo.editingId = null;
      persist();
      renderAll();
    }

    function cancelInlineEdit() {
      state.todo.editingId = null;
      renderTodo();
    }

    function deleteTodo(id) {
      state.todo.items = state.todo.items.filter((item) => item.id !== id);
      if (state.todo.editingId === id) state.todo.editingId = null;
      persist();
      renderAll();
    }

    function renderAll() {
      renderTodo();
      renderMandala();
    }

    function renderTodo() {
      syncFilterChips();
      renderLinkedFilterInfo();
      renderFocusPanel();

      const visible = getVisibleTodos();
      els.todoList.innerHTML = "";

      visible.forEach((item) => {
        const li = document.createElement("li");
        li.className = `item ${item.done ? "done" : ""}`;

        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.checked = item.done;
        checkbox.addEventListener("change", () => toggleTodo(item.id));

        const body = document.createElement("div");

        if (state.todo.editingId === item.id) {
          const box = document.createElement("div");
          box.className = "edit-box";

          const textInput = document.createElement("input");
          textInput.value = item.text;
          textInput.maxLength = 140;
          textInput.setAttribute("data-edit", "text");

          const grid = document.createElement("div");
          grid.className = "edit-grid";

          const dueInput = document.createElement("input");
          dueInput.type = "date";
          dueInput.value = item.dueDate || "";
          dueInput.setAttribute("data-edit", "due");

          const priorityInput = document.createElement("select");
          priorityInput.setAttribute("data-edit", "priority");
          priorityInput.innerHTML = `
            <option value="high">우선순위 높음</option>
            <option value="mid">우선순위 중간</option>
            <option value="low">우선순위 낮음</option>
          `;
          priorityInput.value = item.priority;

          const categoryInput = document.createElement("select");
          categoryInput.setAttribute("data-edit", "category");
          categoryInput.innerHTML = `
            <option value="general">카테고리: 일반</option>
            <option value="study">카테고리: 공부</option>
            <option value="work">카테고리: 일</option>
            <option value="health">카테고리: 건강</option>
            <option value="mandala">카테고리: 만다라트</option>
          `;
          categoryInput.value = item.category;

          grid.append(dueInput, priorityInput, categoryInput);

          const editActions = document.createElement("div");
          editActions.className = "actions";

          const saveBtn = document.createElement("button");
          saveBtn.className = "btn-primary";
          saveBtn.textContent = "저장";
          saveBtn.addEventListener("click", () => saveInlineEdit(item.id, li));

          const cancelBtn = document.createElement("button");
          cancelBtn.className = "btn-ghost";
          cancelBtn.textContent = "취소";
          cancelBtn.addEventListener("click", cancelInlineEdit);

          editActions.append(saveBtn, cancelBtn);
          box.append(textInput, grid, editActions);
          body.append(box);
        } else {
          const title = document.createElement("div");
          title.className = "title";
          title.textContent = item.text;

          const meta = document.createElement("div");
          meta.className = "meta";
          meta.append(makeTag(`우선순위 ${priorityLabel[item.priority]}`));
          meta.append(makeTag(`카테고리 ${categoryLabel[item.category] || "일반"}`));
          meta.append(makeTag(`마감 ${formatDate(item.dueDate)}`));

          if (item.source && item.source.type === "mandala") {
            meta.append(makeTag(`만다라트 ${item.source.cellIndex + 1}번`, true));
          }

          body.append(title, meta);
        }

        const actions = document.createElement("div");
        actions.className = "actions";

        const pinBtn = document.createElement("button");
        pinBtn.className = `btn-ghost pin-btn ${item.today ? "active" : ""}`;
        pinBtn.textContent = item.today ? "⭐ 오늘" : "☆ 오늘";
        pinBtn.addEventListener("click", () => toggleToday(item.id));

        if (state.todo.editingId !== item.id) {
          const editBtn = document.createElement("button");
          editBtn.className = "btn-ghost";
          editBtn.textContent = "수정";
          editBtn.addEventListener("click", () => startInlineEdit(item.id));
          actions.append(editBtn);
        }

        const delBtn = document.createElement("button");
        delBtn.className = "btn-danger";
        delBtn.textContent = "삭제";
        delBtn.addEventListener("click", () => deleteTodo(item.id));

        actions.append(pinBtn, delBtn);
        li.append(checkbox, body, actions);
        els.todoList.append(li);
      });

      const total = state.todo.items.length;
      const done = state.todo.items.filter((item) => item.done).length;
      const remain = total - done;

      els.stats.textContent = `총 ${total}개 / 완료 ${done}개 / 남음 ${remain}개`;
      els.progressBar.style.width = total ? `${Math.round((done / total) * 100)}%` : "0%";
      els.todoEmpty.style.display = visible.length === 0 ? "block" : "none";
    }

    function renderLinkedFilterInfo() {
      if (state.todo.linkedCellFilter === null) {
        els.linkedFilterInfo.style.display = "none";
        return;
      }
      const idx = state.todo.linkedCellFilter + 1;
      els.linkedFilterText.textContent = `만다라트 ${idx}번 칸과 연결된 투두만 표시 중`;
      els.linkedFilterInfo.style.display = "flex";
    }

    // 오늘 플래그가 켜진 항목 중 우선순위가 높은 3개를 기본 노출.
    function renderFocusPanel() {
      const todayItems = state.todo.items
        .filter((item) => item.today)
        .sort((a, b) => {
          if (a.done !== b.done) return Number(a.done) - Number(b.done);
          if (priorityRank[a.priority] !== priorityRank[b.priority]) return priorityRank[b.priority] - priorityRank[a.priority];
          return b.createdAt - a.createdAt;
        });

      els.focusList.innerHTML = "";

      if (todayItems.length === 0) {
        const empty = document.createElement("div");
        empty.className = "focus-item";
        empty.innerHTML = "<span>오늘 항목이 없습니다.</span><small>카드의 ☆ 오늘 버튼을 눌러보세요.</small>";
        els.focusList.append(empty);
        els.focusMoreBtn.style.display = "none";
        return;
      }

      const hiddenCount = Math.max(todayItems.length - 3, 0);
      const visible = state.todo.focusExpanded ? todayItems : todayItems.slice(0, 3);

      visible.forEach((item) => {
        const row = document.createElement("div");
        row.className = "focus-item";

        const left = document.createElement("div");
        left.innerHTML = `<strong>${escapeHtml(item.text)}</strong><br><small>${categoryLabel[item.category] || "일반"} · ${priorityLabel[item.priority]} · 마감 ${formatDate(item.dueDate)}</small>`;

        const right = document.createElement("small");
        right.textContent = item.done ? "완료" : "진행중";

        row.append(left, right);
        els.focusList.append(row);
      });

      if (hiddenCount > 0) {
        els.focusMoreBtn.style.display = "inline-flex";
        els.focusMoreBtn.textContent = state.todo.focusExpanded ? "접기" : `더보기 (+${hiddenCount})`;
      } else {
        els.focusMoreBtn.style.display = "none";
      }
    }

    function makeTag(text, highlight = false) {
      const tag = document.createElement("span");
      tag.className = "tag";
      if (highlight) {
        tag.style.background = "#ecfeff";
        tag.style.borderColor = "#99f6e4";
        tag.style.color = "#0f766e";
      }
      tag.textContent = text;
      return tag;
    }

    function getVisibleTodos() {
      let list = [...state.todo.items];

      if (state.todo.search) {
        list = list.filter((item) => item.text.toLowerCase().includes(state.todo.search));
      }

      if (state.todo.filter === "active") list = list.filter((item) => !item.done);
      if (state.todo.filter === "done") list = list.filter((item) => item.done);
      if (state.todo.filter === "mandala") list = list.filter((item) => item.category === "mandala");
      if (state.todo.linkedCellFilter !== null) {
        list = list.filter((item) => item.source && item.source.type === "mandala" && item.source.cellIndex === state.todo.linkedCellFilter);
      }

      if (state.todo.sort === "created") {
        list.sort((a, b) => b.createdAt - a.createdAt);
      } else if (state.todo.sort === "due") {
        list.sort((a, b) => compareDue(a.dueDate, b.dueDate));
      } else if (state.todo.sort === "priority") {
        list.sort((a, b) => priorityRank[b.priority] - priorityRank[a.priority]);
      }

      return list;
    }

    function compareDue(a, b) {
      if (!a && !b) return 0;
      if (!a) return 1;
      if (!b) return -1;
      return a.localeCompare(b);
    }

    function formatDate(dateStr) {
      if (!dateStr) return "없음";
      const d = new Date(`${dateStr}T00:00:00`);
      return d.toLocaleDateString("ko-KR", { month: "short", day: "numeric" });
    }

    // 만다라트 칸 통계: cellIndex별 연결 투두 수/완료 수 계산.
    function getMandalaTodoStats() {
      const stats = Array.from({ length: 8 }, () => ({ total: 0, done: 0 }));
      state.todo.items.forEach((item) => {
        if (!item.source || item.source.type !== "mandala") return;
        const idx = item.source.cellIndex;
        if (typeof idx !== "number" || idx < 0 || idx > 7) return;
        stats[idx].total += 1;
        if (item.done) stats[idx].done += 1;
      });
      return stats;
    }

    // 셀 클릭 시 TODO 탭으로 이동 + 해당 cellIndex 강필터 적용.
    function jumpToLinkedTodos(cellIndex) {
      state.todo.filter = "mandala";
      state.todo.linkedCellFilter = cellIndex;
      state.todo.editingId = null;
      syncFilterChips();
      setActiveTab("todo");
      renderTodo();
    }

    function renderMandala() {
      const stats = getMandalaTodoStats();
      els.coreGoalInput.value = state.mandala.core;
      els.mandalaGrid.innerHTML = "";

      gridSlots.forEach((slot) => {
        const cell = document.createElement("article");
        cell.className = `manda-cell ${slot.kind === "core" ? "center" : ""}`;

        const title = document.createElement("div");
        title.className = "cell-title";

        if (slot.kind === "core") {
          title.textContent = "중심 목표";
          const text = document.createElement("div");
          text.style.fontWeight = "800";
          text.style.lineHeight = "1.4";
          text.style.wordBreak = "break-word";
          text.textContent = state.mandala.core || "중심 목표를 먼저 입력해보세요.";
          cell.append(title, document.createElement("div"), text, document.createElement("div"));
        } else {
          title.textContent = `확장 목표 ${slot.index + 1}`;

          const badge = document.createElement("div");
          badge.className = "cell-badge";
          badge.textContent = `연결된 투두 ${stats[slot.index].total}개 / 완료 ${stats[slot.index].done}개`;

          const textarea = document.createElement("textarea");
          textarea.placeholder = "실행 아이디어 입력";
          textarea.value = state.mandala.cells[slot.index];
          textarea.addEventListener("input", (event) => {
            state.mandala.cells[slot.index] = event.target.value;
            persist();
          });

          const addBtn = document.createElement("button");
          addBtn.className = "btn-primary";
          addBtn.textContent = "할일로 추가";
          addBtn.addEventListener("click", (event) => {
            event.stopPropagation();
            const text = state.mandala.cells[slot.index].trim();
            if (!text) {
              alert("먼저 내용을 입력하세요.");
              return;
            }
            addTodoFromMandala(text, slot.index);
            persist();
            renderAll();
            alert("할일 탭에 추가했습니다.");
          });

          cell.classList.add("linkable");
          cell.addEventListener("click", (event) => {
            if (event.target.closest("textarea") || event.target.closest("button")) return;
            jumpToLinkedTodos(slot.index);
          });

          cell.append(title, badge, textarea, addBtn);
        }

        els.mandalaGrid.append(cell);
      });
    }

    function syncFilterChips() {
      for (const chip of els.filterChips.querySelectorAll("button")) {
        chip.classList.toggle("active", chip.dataset.filter === state.todo.filter);
      }
    }

    function exportJson() {
      const payload = {
        exportedAt: new Date().toISOString(),
        storageKey: STORAGE_KEY,
        data: state
      };
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `focus-planner-backup-${new Date().toISOString().slice(0, 10)}.json`;
      a.click();
      URL.revokeObjectURL(url);
    }

    async function importJsonFile(event) {
      const file = event.target.files && event.target.files[0];
      if (!file) return;

      try {
        const text = await file.text();
        const parsed = JSON.parse(text);
        const data = parsed && parsed.data ? parsed.data : parsed;
        const normalized = normalizeImportedState(data);
        if (!normalized) {
          alert("JSON 형식이 올바르지 않습니다. 백업 파일을 확인하세요.");
          return;
        }

        state.todo = normalized.todo;
        state.mandala = normalized.mandala;
        persist();
        renderAll();
        alert("데이터를 가져왔습니다.");
      } catch {
        alert("JSON 파일을 읽는 중 오류가 발생했습니다.");
      }
    }

    function normalizeImportedState(value) {
      if (!value || typeof value !== "object") return null;

      return {
        todo: {
          items: normalizeTodoItems(value.todo && value.todo.items),
          search: "",
          filter: "all",
          sort: ["created", "due", "priority"].includes(value.todo && value.todo.sort) ? value.todo.sort : "created",
          linkedCellFilter: null,
          editingId: null,
          focusExpanded: false
        },
        mandala: {
          core: typeof (value.mandala && value.mandala.core) === "string" ? value.mandala.core : "",
          cells: normalizeCells(value.mandala && value.mandala.cells)
        }
      };
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return defaultState();

        const parsed = JSON.parse(raw);
        if (!parsed || typeof parsed !== "object") return defaultState();

        return {
          todo: {
            items: normalizeTodoItems(parsed.todo && parsed.todo.items),
            search: "",
            filter: ["all", "active", "done", "mandala"].includes(parsed.todo && parsed.todo.filter) ? parsed.todo.filter : "all",
            sort: ["created", "due", "priority"].includes(parsed.todo && parsed.todo.sort) ? parsed.todo.sort : "created",
            linkedCellFilter: null,
            editingId: null,
            focusExpanded: false
          },
          mandala: {
            core: typeof (parsed.mandala && parsed.mandala.core) === "string" ? parsed.mandala.core : "",
            cells: normalizeCells(parsed.mandala && parsed.mandala.cells)
          }
        };
      } catch {
        return defaultState();
      }
    }

    function normalizeTodoItems(value) {
      if (!Array.isArray(value)) return [];
      return value
        .filter((item) => item && typeof item.id === "string" && typeof item.text === "string")
        .map((item) => ({
          id: item.id,
          text: item.text,
          dueDate: typeof item.dueDate === "string" && item.dueDate ? item.dueDate : null,
          priority: ["high", "mid", "low"].includes(item.priority) ? item.priority : "mid",
          category: ["general", "study", "work", "health", "mandala"].includes(item.category) ? item.category : "general",
          done: Boolean(item.done),
          today: Boolean(item.today),
          source: item.source && typeof item.source === "object" ? item.source : null,
          createdAt: typeof item.createdAt === "number" ? item.createdAt : Date.now()
        }));
    }

    function normalizeCells(value) {
      if (!Array.isArray(value)) return Array(8).fill("");
      const result = Array(8).fill("");
      for (let i = 0; i < 8; i += 1) {
        result[i] = typeof value[i] === "string" ? value[i] : "";
      }
      return result;
    }

    function defaultState() {
      return {
        todo: {
          items: [],
          search: "",
          filter: "all",
          sort: "created",
          linkedCellFilter: null,
          editingId: null,
          focusExpanded: false
        },
        mandala: {
          core: "",
          cells: Array(8).fill("")
        }
      };
    }

    function persist() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function escapeHtml(value) {
      return value
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }
  </script>
</body>
</html>
